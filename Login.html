<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES Nyakabanda | Admin Login</title>
    <link rel="icon" type="image/png" href="Logo.png">

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="back-home">&larr; Back to Website</a>
            <h2>Admin Portal Login</h2>
            <p class="login-subtitle">Authorized School Staff Only</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="adminUser">Username or Email</label>
                    <input type="text" id="adminUser" required placeholder="e.g., admin@esnyakabanda.ac.rw">
                </div>
                <div class="form-group">
                    <label for="adminPass">Password</label>
                    <input type="password" id="adminPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Secure Login</button>
                <p id="loginStatus" class="status-msg"></p>
            </form>
        </div>
    </div>

    <!-- Injecting the script helper directly for easy handling -->
    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const status = document.getElementById('loginStatus');
            
            // Temporary static credentials for security testing simulation
            if (user === "admin" && pass === "Nyakabanda2026") {
                status.style.color = "green";
                status.innerText = "Access Granted! Redirecting to Dashboard...";
                
                // Simulate taking them to a dashboard panel
                setTimeout(() => {
                    alert("Dashboard backend system would load here!");
                }, 1500);
            } else {
                status.style.color = "red";
                status.innerText = "Invalid credentials. Please contact system manager.";
            }
        }
    </script>
</body>
</html>
